<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SABIE — Módulos</title>
<style>
  :root{
    --primary:#1e3a8a; --primary-dark:#172d6e; --primary-light:#3b82f6;
    --bg:#f1f5f9; --surface:#fff; --text:#1f2937; --muted:#64748b;
    --border:#e2e8f0; --ok:#16a34a; --radius:14px; --shadow:0 2px 8px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* ── HEADER ── */
  header.appbar{background:var(--primary);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .hdr-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
  .hdr-text{flex:1;min-width:180px}
  .hdr-area{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.75}
  .hdr-materia{font-size:1.25rem;font-weight:800;letter-spacing:-.01em}
  .btn-nav{color:rgba(255,255,255,.9);text-decoration:none;display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:700;border:1px solid rgba(255,255,255,.32);padding:8px 14px;border-radius:9px;transition:background .15s,color .15s;background:transparent;cursor:pointer;font-family:inherit}
  .btn-nav:hover{background:rgba(255,255,255,.18)}

  /* ── GRID (idéntico al portal original) ── */
  main{max-width:960px;margin:0 auto;padding:28px 16px 48px}
  .sec-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}

  .mod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:10px;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;overflow:hidden}
  .mod-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.11);border-color:var(--accent,var(--primary-light))}
  .mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--primary-light));border-radius:var(--radius) var(--radius) 0 0}
  .mod-top{display:flex;align-items:center;gap:12px}
  .mod-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--icon-bg,#eff6ff);color:var(--icon-color,var(--primary));flex-shrink:0;font-size:1.3rem}
  .mod-title{font-size:1rem;font-weight:700;line-height:1.2}
  .mod-desc{font-size:.82rem;color:var(--muted);line-height:1.45;flex:1}
  .mod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .mod-tag{font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--tag-bg,#eff6ff);color:var(--tag-color,var(--primary))}
  .mod-arrow{color:#cbd5e1;font-size:.9rem;transition:transform .15s}
  .mod-card:hover .mod-arrow{transform:translateX(3px);color:var(--accent,var(--primary-light))}

  .c-cal{--accent:#3b82f6;--icon-bg:#eff6ff;--icon-color:#1e40af;--tag-bg:#dbeafe;--tag-color:#1e40af}
  .c-plan{--accent:#8b5cf6;--icon-bg:#f5f3ff;--icon-color:#6d28d9;--tag-bg:#ede9fe;--tag-color:#5b21b6}
  .c-ex3{--accent:#f59e0b;--icon-bg:#fffbeb;--icon-color:#b45309;--tag-bg:#fef3c7;--tag-color:#92400e}
  .c-ex11{--accent:#ef4444;--icon-bg:#fef2f2;--icon-color:#991b1b;--tag-bg:#fee2e2;--tag-color:#991b1b}
  .c-asi{--accent:#10b981;--icon-bg:#ecfdf5;--icon-color:#065f46;--tag-bg:#d1fae5;--tag-color:#065f46}
  .c-com{--accent:#06b6d4;--icon-bg:#ecfeff;--icon-color:#0e7490;--tag-bg:#cffafe;--tag-color:#0e7490}
  .c-hor{--accent:#f97316;--icon-bg:#fff7ed;--icon-color:#c2410c;--tag-bg:#ffedd5;--tag-color:#9a3412}
  .c-evt{--accent:#7c3aed;--icon-bg:#ede9fe;--icon-color:#5b21b6;--tag-bg:#f3e8ff;--tag-color:#4c1d95}

  footer{text-align:center;padding:20px;color:var(--muted);font-size:.76rem;border-top:1px solid var(--border)}
  .empty-msg{text-align:center;padding:60px 20px;color:var(--muted)}
</style>
<link rel="stylesheet" href="lv-tema.css">
</head>
<body>
<script src="auth.js"></script>
<script>LV_AUTH.exigirSesion();</script>


<header class="appbar">
  <button class="btn-nav" id="btn-atras" onclick="volverAtras()">← Atrás</button>
  <div class="hdr-icon" id="hdr-icon">📘</div>
  <div class="hdr-text">
    <div class="hdr-area" id="hdr-area">Área</div>
    <div class="hdr-materia" id="hdr-materia">Materia</div>
  </div>
  <a class="btn-nav" href="index.html">🏠 Portal</a>
</header>

<main>
  <div class="sec-label">Módulos de la materia</div>
  <div class="grid" id="grid"></div>
  <div class="sec-label" id="lbl-inst" style="margin-top:32px">Institucionales y transversales</div>
  <div class="grid" id="grid-inst"></div>
  <div class="empty-msg" id="empty-msg" style="display:none">No se especificó una materia. Vuelve al <a href="index.html">portal</a> y elige un área.</div>
</main>

<footer>
  <strong>SABIE</strong> — Sistema de Aprendizaje, Bienestar e Inclusión Educativa
</footer>

<script>
const MODULOS = [
  { icon:'📊', clase:'c-cal', titulo:'Calificaciones y Reportes', desc:'Planilla de notas por periodo, desempeño cognitivo/autoevaluación/coevaluación, importación desde Excel.', tag:'📊 Notas', href:'modulos/01-calificaciones.html' },
  { icon:'🗂️', clase:'c-plan', titulo:'Planeador de Clases', desc:'Crea y gestiona planeadores por grado y período. Importa JSON de Claude, visualiza e imprime.', tag:'🗂️ Planeación', href:'modulos/02-planeador.html' },
  { icon:'📝', clase:'c-ex3', titulo:'Exámenes · 6° a 10°', desc:'Opción múltiple, V/F y abiertos. Banco de preguntas, hoja de respuestas e impresión. Calificación automática 85/15.', tag:'📝 6°–10°', href:'modulos/03-examenes.html' },
  { icon:'🎯', clase:'c-ex11', titulo:'Simulacros Saber 11°', desc:'Tipo ICFES, alineado a la Matriz Saber 11. Clasifica por competencia y afirmación. Cronometrado y en línea.', tag:'🎯 ICFES', href:'modulos/04-examenes-11.html' },
  { icon:'✅', clase:'c-asi', titulo:'Control de Asistencia', desc:'Registro P/F/T/E, calendario mensual, estadísticas por estudiante. Exportación CSV. Comparte cursos con Comunicados.', tag:'✅ Asistencia', href:'modulos/05-asistencia.html' },
  { icon:'✉️', clase:'c-com', titulo:'Comunicados y Citaciones', desc:'4 plantillas: citación, felicitación, mejoramiento, circular. Preview WhatsApp + carta imprimible. Historial completo.', tag:'✉️ Comunicados', href:'modulos/06-comunicados.html' },
  { icon:'🗓️', clase:'c-hor', titulo:'Horario Semanal', desc:'Cuadrícula Lun–Vie · 7 bloques de 50 min · color por asignatura. Guarda automáticamente. Imprimible.', tag:'🗓️ Horario', href:'modulos/07-horario.html' },
  { icon:'📅', clase:'c-evt', titulo:'Eventos Institucionales', desc:'Calendario de reuniones, fechas académicas, festivos y eventos externos. Recordatorio automático en el portal.', tag:'📅 Calendario', href:'modulos/08-eventos.html' },
  { icon:'👪', clase:'c-com', titulo:'Acudientes', desc:'Base de datos compartida de acudientes por grado, curso y estudiante. La alimenta cualquier docente y todos ven la misma información.', tag:'👪 Contactos', href:'modulos/09-acudientes.html' },
];

const MODULOS_INST = [
  { icon:'📔', clase:'c-plan', titulo:'Observador del Estudiante', desc:'Situaciones Tipo I–III (Ley 1620), reconocimientos y compromisos con seguimiento. Impresión con firmas.', tag:'📔 Convivencia', href:'modulos/10-observador.html' },
  { icon:'♿', clase:'c-asi', titulo:'Inclusión (DUA · PIAR)', desc:'Planeación DUA y PIAR (Decreto 1421) con motor de barreras y ajustes razonables por estudiante.', tag:'♿ Inclusión', href:'modulos/11-inclusion.html' },
  { icon:'🧭', clase:'c-cal', titulo:'Mi Grupo (Director)', desc:'Tablero del director de grupo: semáforos por estudiante, tendencias y alerta temprana de deserción.', tag:'🧭 Dirección', href:'modulos/12-director.html' },
  { icon:'📄', clase:'c-ex3', titulo:'Boletines', desc:'Informes por periodo con observaciones automáticas del observador e impresión por grupo.', tag:'📄 Boletines', href:'modulos/13-boletines.html' },
  { icon:'📈', clase:'c-ex11', titulo:'Analítica', desc:'Radiografía ICFES por competencia y hoja de vida académica completa de cada estudiante.', tag:'📈 Datos', href:'modulos/14-analitica.html' },
  { icon:'🧰', clase:'c-com', titulo:'Herramientas pedagógicas', desc:'Test de lectura, cálculo mental, rúbricas, sociograma, tiquete de salida y más — con envío de nota a la planilla.', tag:'🧰 Formativa', href:'modulos/15-herramientas.html' },
];

const AREAS_ICONOS = {
  'Ciencias Sociales':'🌎','Ciencias Naturales':'🔬','Humanidades':'📖','Matemáticas':'📐',
  'Tecnología e Informática':'💻','Artística y Emprendimiento':'🎨','Religión':'🕊️','Ética':'🤝','Educación Física':'⚽'
};

(function(){
  const params = new URLSearchParams(location.search);
  const area = params.get('area');
  const materia = params.get('materia');

  if(!area || !materia){
    document.getElementById('grid').style.display='none';
    document.getElementById('grid-inst').style.display='none';
    document.getElementById('lbl-inst').style.display='none';
    document.querySelector('.sec-label').style.display='none';
    document.getElementById('empty-msg').style.display='block';
    return;
  }

  try{
    sessionStorage.setItem('lv_ctx_area', area);
    sessionStorage.setItem('lv_ctx_materia', materia);
  }catch(_){}

  document.getElementById('hdr-area').textContent = area;
  document.getElementById('hdr-materia').textContent = materia;
  document.getElementById('hdr-icon').textContent = AREAS_ICONOS[area] || '📘';

  const grid = document.getElementById('grid');
  grid.innerHTML = MODULOS.map(m => `
    <a href="${m.href}?area=${encodeURIComponent(area)}&materia=${encodeURIComponent(materia)}" class="mod-card ${m.clase}">
      <div class="mod-top">
        <div class="mod-icon">${m.icon}</div>
        <div class="mod-title">${m.titulo}</div>
      </div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-footer"><span class="mod-tag">${m.tag}</span><span class="mod-arrow">→</span></div>
    </a>
  `).join('');

  document.getElementById('grid-inst').innerHTML = MODULOS_INST.map(m => `
    <a href="${m.href}" class="mod-card ${m.clase}">
      <div class="mod-top">
        <div class="mod-icon">${m.icon}</div>
        <div class="mod-title">${m.titulo}</div>
      </div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-footer"><span class="mod-tag">${m.tag}</span><span class="mod-arrow">→</span></div>
    </a>
  `).join('');
})();

function volverAtras(){
  // Si venimos de una navegación real dentro del sitio, retrocede en el historial;
  // si se abrió esta página directamente (o no hay historial propio), vuelve al portal.
  if(document.referrer && document.referrer.indexOf(location.origin) === 0 && history.length > 1){
    history.back();
  } else {
    location.href = 'index.html';
  }
}
</script>
</body>
</html>
