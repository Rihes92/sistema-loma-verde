  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.4}
  header.appbar{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  #reto-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:none;align-items:center;gap:12px;flex-wrap:wrap;font-size:.95rem}
  #reto-bar.on{display:flex}
  #reto-bar b{color:var(--primary)}
  .tp{display:grid;grid-template-columns:repeat(18,minmax(34px,1fr));gap:3px;min-width:760px}
  .tpwrap{overflow-x:auto;padding-bottom:8px}
  .el{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:700;transition:transform .08s;border:1px solid rgba(0,0,0,.08);user-select:none}
  .el:hover{transform:scale(1.12);z-index:2;box-shadow:0 4px 12px rgba(0,0,0,.25)}
  .el .z{font-size:.5rem;font-weight:600;opacity:.7}
  .el .s{font-size:.8rem}
  .el.acierto{outline:3px solid #16a34a}
  .el.fallo{outline:3px solid #dc2626}
  .hueco{visibility:hidden}
  .leyenda{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;font-size:.7rem}
  .leyenda span{display:inline-flex;align-items:center;gap:5px}
  .leyenda i{width:13px;height:13px;border-radius:4px;display:inline-block}

  .c-met{background:#a7f3d0}.c-nom{background:#bae6fd}.c-hal{background:#c7d2fe}.c-gas{background:#e9d5ff}
  .c-lan{background:#fbcfe8}.c-act{background:#fda4af}

  #panel.open{transform:none}
  #panel .cab{display:flex;gap:14px;align-items:center;margin-bottom:8px}
  #panel .simbolo{width:64px;height:64px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:1.5rem;border:1px solid rgba(0,0,0,.1)}
  #panel h2{font-size:1.2rem;color:var(--primary)}
  #panel .datos{font-size:.85rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px}

  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:9px;font-size:.85rem;opacity:0;transition:.25s;z-index:99;pointer-events:none}

  #fin .btn{border:0;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer;background:var(--primary);color:#fff;margin-top:8px}

// posición (columna) por Z
function col(z){
  if(z===1)return 1; if(z===2)return 18;
  const p=[ [3,2,1],[5,10,13],[11,12,1],[13,18,13],[19,20,1],[21,30,3],[31,36,13],[37,38,1],[39,48,3],[49,54,13],[55,56,1],[72,80,4],[81,86,13],[87,88,1],[104,112,4],[113,118,13] ];
  for(const [a,b,c] of p){ if(z>=a&&z<=b) return c+(z-a); }
  if(z>=57&&z<=71) return 3+(z-57); // fila lantánidos
  if(z>=89&&z<=103) return 3+(z-89);
  return 1;
}
function fila(z){
  if(z<=2)return 1; if(z<=10)return 2; if(z<=18)return 3; if(z<=36)return 4; if(z<=54)return 5;
  if(z>=57&&z<=71)return 9; if(z<=86)return 6; if(z>=89&&z<=103)return 10; return z<=88?7:7;
}
const tabla=document.getElementById('tabla');
ELEM.forEach((e,i)=>{
  const z=i+1;
  const d=document.createElement('div');
  d.className='el c-'+e[3];
  d.style.gridColumn=col(z); d.style.gridRow=fila(z);
  d.innerHTML=`<span class="z">${z}</span><span class="s">${e[0]}</span>`;
  d.title=e[1]; d.dataset.z=z;
  d.addEventListener('click',()=>clicElemento(z,d));
  tabla.appendChild(d);
});

let modo='explorar';
function clicElemento(z,el){
  if(modo==='reto'){ evaluarReto(z,el); return; }
  const e=ELEM[z-1];
  document.getElementById('p-sim').textContent=e[0];
  document.getElementById('p-sim').className='simbolo c-'+e[3];
  document.getElementById('p-nom').textContent=z+'. '+e[1];
  document.getElementById('p-z').textContent='Número atómico: '+z;
  document.getElementById('p-masa').textContent='Masa: '+e[2];
  document.getElementById('p-cat').textContent=CATN[e[3]];
  document.getElementById('p-uso').textContent='💡 '+e[4];
  document.getElementById('panel').classList.add('open');
}

/* ── Reto ── */
let reto=null;
document.getElementById('m-explorar').onclick=()=>{ modo='explorar'; pintarModo(); };
document.getElementById('m-reto').onclick=()=>{ modo='reto'; pintarModo(); iniciarReto(); };
function pintarModo(){
  document.getElementById('m-explorar').classList.toggle('active',modo==='explorar');
  document.getElementById('m-reto').classList.toggle('active',modo==='reto');
  document.getElementById('reto-bar').classList.toggle('on',modo==='reto');
  if(modo==='explorar') document.getElementById('fin').classList.remove('on');
}
window.iniciarReto=function(){
  const idx=[...Array(ELEM.length).keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  reto={rondas:idx.slice(0,10),n:0,ok:0};
  document.getElementById('fin').classList.remove('on');
  pintarPregunta();
};
function pintarPregunta(){
  const z=reto.rondas[reto.n]+1, e=ELEM[z-1];
  const porNombre=Math.random()<0.6;
  reto.objetivo=z;
  document.getElementById('reto-preg').innerHTML=porNombre
    ? '🔎 Encuentra: <b>'+e[1]+'</b>'
    : '🔎 Encuentra el elemento cuyo uso es: <b>'+e[4]+'</b>';
  document.getElementById('reto-n').textContent=reto.n+1;
  document.getElementById('reto-ok').textContent=reto.ok;
}
function evaluarReto(z,el){
  if(!reto) return;
  if(z===reto.objetivo){ reto.ok++; el.classList.add('acierto'); toast('✅ ¡Correcto! '+ELEM[z-1][1]); }
  else { el.classList.add('fallo'); toast('❌ Ese es '+ELEM[z-1][1]+'. Era '+ELEM[reto.objetivo-1][1]); }
  setTimeout(()=>{ document.querySelectorAll('.el').forEach(x=>x.classList.remove('acierto','fallo'));
    reto.n++;
    if(reto.n>=10) finReto(); else pintarPregunta();
  },900);
}
let notaReto=0;
function finReto(){
  notaReto=Math.max(1,Math.round((1+(reto.ok/10)*4)*10)/10);
  document.getElementById('fin-txt').textContent=`🏁 Reto terminado: ${reto.ok}/10 aciertos → nota ${notaReto.toFixed(1)}`;
  document.getElementById('fin').classList.add('on');
  document.getElementById('reto-ok').textContent=reto.ok;
}
const sel=LV_HERR.selectorEstudiante('f-curso','f-est');
document.getElementById('f-enviar').onclick=()=>{
  const c=sel.curso(), e=sel.estudiante();
  if(!c||!e) return toast('Elige curso y estudiante');
  LV_HERR.guardarResultado({herramienta:'Tabla Periódica',estudiante:e.nombre,estId:e.id,curso:(c.grado||'')+(c.grupo?'-'+c.grupo:''),grado:c.grado,grupo:c.grupo,nota:notaReto,nivel:reto.ok+'/10',detalle:{aciertos:reto.ok}});
  const r=LV_HERR.enviarAPlanilla({cursoId:c.id,estId:e.id,periodo:document.getElementById('f-per').value,nota:notaReto,etiqueta:'Tabla Periódica'});
  toast(r.msg);
};
</script>
