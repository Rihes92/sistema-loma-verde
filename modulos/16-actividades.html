<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Banco de Actividades — SABIE</title>
<script src="../auth.js"></script>
<script>LV_AUTH.exigirSesion();</script>
<script>window.LV_SYNC_TABLAS=['lv_actividades'];</script>
<script src="../sync.js"></script>
<style>
  :root{--primary:#1e3a8a;--primary-light:#3b82f6;--bg:#f1f5f9;--surface:#fff;--text:#1f2937;--muted:#64748b;--border:#e2e8f0;--ok:#16a34a;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
  header.appbar{background:var(--primary);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header.appbar h1{font-size:1.1rem;margin:0;font-weight:700;flex:1}
  header.appbar .pill{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:999px;font-size:.78rem}
  header.appbar a.portal-btn{color:rgba(255,255,255,.85);text-decoration:none;font-size:.82rem;font-weight:600;border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:7px;margin-left:auto}
  header.appbar a.portal-btn:hover{background:rgba(255,255,255,.18)}
  main{max-width:1100px;margin:0 auto;padding:18px}
  .filtros{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .filtros select,.filtros input{padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:.9rem;background:#fff;color:var(--text)}
  .filtros input{flex:1;min-width:180px}
  .filtros select:focus,.filtros input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .stats{font-size:.8rem;color:var(--muted);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .act{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:transform .1s,box-shadow .12s;display:flex;flex-direction:column;gap:8px}
  .act:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
  .act .top{display:flex;gap:10px;align-items:flex-start}
  .act .ico{font-size:1.5rem;flex-shrink:0}
  .act h3{font-size:.9rem;font-weight:700;line-height:1.3;flex:1}
  .act .meta{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:999px;background:#eff6ff;color:#1e3a8a}
  .tag.g{background:#dcfce7;color:#166534}
  .tag.t{background:#fef3c7;color:#92400e}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 20px;border-radius:10px;font-size:.86rem;opacity:0;transition:.3s;z-index:90;pointer-events:none}
  .toast.show{opacity:1}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:60;display:none;align-items:center;justify-content:center;padding:14px}
  #modal.show{display:flex}
  .mbox{background:#fff;border-radius:14px;width:min(96vw,900px);height:min(92vh,700px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .mhead{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .mhead h3{font-size:.92rem;flex:1;line-height:1.3}
  .mhead button,.mhead a{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 12px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--text);text-decoration:none;white-space:nowrap}
  .mhead button:hover,.mhead a:hover{background:#f1f5f9}
  .mbody{flex:1;background:#525659;display:flex;align-items:center;justify-content:center;overflow:auto;position:relative}
  .mbody iframe{width:100%;height:100%;border:0}
  .mbody img{max-width:100%;max-height:100%;object-fit:contain}
  .cargando{color:#fff;font-size:.9rem;text-align:center;padding:30px}
  @media(max-width:600px){.grid{grid-template-columns:1fr 1fr}}
</style>
<link rel="stylesheet" href="../lv-tema.css">
</head>
<body>

<header class="appbar">
  <h1>🎨 Banco de Actividades</h1>
  <span class="pill">SABIE</span>
  <a href="../index.html" class="portal-btn">← Portal</a>
</header>

<main>
  <div class="filtros">
    <input id="f-buscar" type="search" placeholder="Buscar actividad… (ej: vocales, dinosaurio, sumas)" autocomplete="off">
    <select id="f-grado"><option value="">Todos los grados</option></select>
    <select id="f-cat"><option value="">Todas las categorías</option></select>
    <select id="f-tipo"><option value="">Todos los tipos</option><option value="pdf">PDF</option><option value="imagen">Imagen</option></select>
  </div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"></div>
</main>

<div id="modal">
  <div class="mbox">
    <div class="mhead">
      <h3 id="m-titulo">…</h3>
      <a id="m-abrir" href="#" target="_blank" rel="noopener">🖨️ Abrir / Imprimir</a>
      <button id="m-descargar">⬇️ Descargar</button>
      <button id="m-cerrar">✕ Cerrar</button>
    </div>
    <div class="mbody" id="m-body"><div class="cargando">Cargando…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

const ORDEN_GRADO=['Prejardín','Jardín','Transición','Transición/1°','Preescolar','Preescolar a 2°','Preescolar a 3°','1°','2°','3°','4°','5°','6°','2° a 5°','3° a 5°','4° a 6°','Primaria','Todos'];
function leer(){ try{ return (JSON.parse(localStorage.getItem('lv_actividades'))||[]).filter(a=>a&&!a._eliminado); }catch(_){ return []; } }

let ACTS=[];
function poblarFiltros(){
  const gs=[...new Set(ACTS.map(a=>a.grado).filter(Boolean))].sort((a,b)=>ORDEN_GRADO.indexOf(a)-ORDEN_GRADO.indexOf(b));
  $('#f-grado').innerHTML='<option value="">Todos los grados</option>'+gs.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  const cs=[...new Set(ACTS.map(a=>a.categoria).filter(Boolean))].sort();
  $('#f-cat').innerHTML='<option value="">Todas las categorías</option>'+cs.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
const ICO={pdf:'📄',imagen:'🖼️'};
const norm=v=>String(v??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function render(){
  const q=norm($('#f-buscar').value.trim());
  const fg=$('#f-grado').value, fc=$('#f-cat').value, ft=$('#f-tipo').value;
  const lista=ACTS.filter(a=>
    (!fg||a.grado===fg)&&(!fc||a.categoria===fc)&&(!ft||a.tipo===ft)&&
    (!q||norm(a.titulo+' '+(a.sub||'')).includes(q)));
  $('#stats').textContent=lista.length?`${lista.length} actividad(es)`:'';
  $('#grid').innerHTML=lista.slice(0,400).map(a=>`
    <div class="act" onclick="abrir('${esc(a.id)}')">
      <div class="top"><div class="ico">${ICO[a.tipo]||'📎'}</div><h3>${esc(a.titulo)}</h3></div>
      ${a.sub?`<div style="font-size:.72rem;color:var(--muted)">${esc(a.sub)}</div>`:''}
      <div class="meta">
        ${a.grado?`<span class="tag g">${esc(a.grado)}</span>`:''}
        <span class="tag">${esc(a.categoria||'')}</span>
        <span class="tag t">${esc((a.tipo||'').toUpperCase())} · ${a.mb?a.mb.toFixed(1)+' MB':''}</span>
      </div>
    </div>`).join('');
  const e=$('#empty');
  if(!ACTS.length){
    e.innerHTML='📦 El catálogo aún no ha llegado a este dispositivo.<br>Verifica tu conexión y toca <b>Sincronizar ahora</b> en el portal.<br><span style="font-size:.8rem">(Si eres administrador: corre <code>migracion_actividades.sql</code> en Supabase.)</span>';
    e.style.display='block';
  } else if(!lista.length){ e.innerHTML='Sin resultados con esos filtros.'; e.style.display='block'; }
  else e.style.display='none';
}

// ── visor: descarga autenticada desde Supabase Storage ──
let blobActual=null, nombreActual='archivo';
window.abrir=async id=>{
  const a=ACTS.find(x=>x.id===id); if(!a)return;
  $('#m-titulo').textContent=a.titulo;
  $('#m-body').innerHTML='<div class="cargando">⬇️ Descargando '+(a.mb?a.mb.toFixed(1)+' MB':'')+'…<br><span style="font-size:.78rem;opacity:.8">Se necesita conexión a internet.</span></div>';
  $('#modal').classList.add('show');
  try{
    const t=await LV_AUTH.getValidToken();
    if(!t) throw new Error('Tu sesión expiró. Vuelve a iniciar sesión.');
    const ruta=a.ruta.split('/').map(encodeURIComponent).join('/');
    const r=await fetch(`${LV_AUTH.URL}/storage/v1/object/authenticated/actividades/${ruta}`,
      { headers:{ 'apikey': LV_AUTH.KEY, 'Authorization':'Bearer '+t } });
    if(!r.ok) throw new Error(r.status===404?'El archivo aún no está subido al almacenamiento (avisa a Coordinación).':'No se pudo descargar ('+r.status+').');
    const blob=await r.blob();
    if(blobActual) URL.revokeObjectURL(blobActual);
    blobActual=URL.createObjectURL(blob);
    nombreActual=a.ruta.split('/').pop();
    $('#m-abrir').href=blobActual;
    $('#m-body').innerHTML = a.tipo==='imagen'
      ? `<img src="${blobActual}" alt="">`
      : `<iframe src="${blobActual}" title="vista previa"></iframe>`;
  }catch(err){
    $('#m-body').innerHTML='<div class="cargando">❌ '+esc(err.message||'Error de red — ¿tienes internet?')+'</div>';
  }
};
$('#m-cerrar').onclick=()=>{ $('#modal').classList.remove('show'); $('#m-body').innerHTML=''; };
$('#modal').addEventListener('click',e=>{ if(e.target.id==='modal') $('#m-cerrar').click(); });
$('#m-descargar').onclick=()=>{
  if(!blobActual) return toast('Espera a que cargue');
  const l=document.createElement('a'); l.href=blobActual; l.download=nombreActual; l.click();
};

['#f-buscar','#f-grado','#f-cat','#f-tipo'].forEach(s=>{ $(s).addEventListener('input',render); });

function refrescar(){ ACTS=leer().sort((a,b)=>ORDEN_GRADO.indexOf(a.grado)-ORDEN_GRADO.indexOf(b.grado)||String(a.titulo).localeCompare(b.titulo)); poblarFiltros(); render(); }
refrescar();
// si el catálogo llega después (primera sincronización), refrescar
let intentos=0;
const espera=setInterval(()=>{ if(leer().length!==ACTS.length){ refrescar(); } if(++intentos>20||ACTS.length) clearInterval(espera); }, 1500);
</script>
</body>
</html>
