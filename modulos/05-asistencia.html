<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Asistencia — Loma Verde</title>
<style>
  :root{
    --primary:#1e3a8a; --primary-light:#3b82f6; --bg:#f1f5f9; --surface:#fff;
    --text:#1f2937; --muted:#64748b; --border:#e2e8f0;
    --ok:#16a34a; --bad:#dc2626; --warn:#d97706; --info:#0369a1;
    --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
  header.appbar{background:var(--primary);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header.appbar h1{font-size:1.1rem;margin:0;font-weight:700;flex:1}
  header.appbar .pill{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:999px;font-size:.78rem}
  nav.tabs{display:flex;gap:4px;background:var(--surface);padding:6px;overflow-x:auto;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
  nav.tabs button{border:0;background:transparent;padding:10px 16px;border-radius:8px;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  nav.tabs button.active{background:var(--primary);color:#fff}
  main{max-width:1200px;margin:0 auto;padding:18px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
  .card h2{margin:0 0 14px;font-size:1.05rem;color:var(--primary)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>*{flex:1;min-width:160px}
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:.82rem;font-weight:600;color:var(--muted)}
  input,select{padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:.92rem;width:100%;background:#fff;color:var(--text)}
  input:focus,select:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  button.btn{border:0;border-radius:8px;padding:9px 16px;font-size:.88rem;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;display:inline-flex;align-items:center;gap:6px}
  button.btn.sec{background:#e2e8f0;color:var(--text)}
  button.btn.ok{background:var(--ok)}
  button.btn.sm{padding:6px 10px;font-size:.8rem}
  button.btn:hover{filter:brightness(1.07)}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
  th{background:#f8fafc;font-weight:700;color:var(--primary);position:sticky;top:0}
  td.c,th.c{text-align:center}
  .tableScroll{overflow-x:auto}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:700}
  .b-ok{background:#dcfce7;color:#166534}
  .b-warn{background:#fef9c3;color:#854d0e}
  .b-bad{background:#fee2e2;color:#991b1b}
  .muted{color:var(--muted)}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:700px){.grid2{grid-template-columns:1fr}}
  /* Calendario */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
  .cal-head{font-size:.7rem;font-weight:700;color:var(--muted);padding:4px 0}
  .cal-dia{padding:7px 2px;border-radius:7px;font-size:.78rem;font-weight:600;color:var(--muted);position:relative;cursor:default;transition:background .12s}
  .cal-dia.clickable{cursor:pointer;color:var(--text)}
  .cal-dia.clickable:hover{background:#e0e7ff}
  .cal-dia.con-reg{background:#dbeafe;color:var(--primary)}
  .cal-dia.seleccionado{background:var(--primary);color:#fff}
  .cal-dia.hoy{border:2px solid var(--primary);color:var(--primary)}
  .cal-dia.hoy.seleccionado{border:2px solid #1e40af}
  .cal-punto{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--primary-light);border-radius:50%}
  /* Radio estados */
  .radio-p{accent-color:#16a34a}
  .radio-f{accent-color:#dc2626}
  .radio-t{accent-color:#d97706}
  .radio-e{accent-color:#0369a1}
  /* Leyenda */
  .leyenda{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .leyenda span{font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .hide{display:none!important}
  @media print{nav.tabs,.appbar,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:none}}

  /* ── Botón ← Portal ─────────────────────────────────────────── */
  header.appbar a.portal-btn{color:rgba(255,255,255,.85);text-decoration:none;display:flex;align-items:center;gap:5px;font-size:.82rem;font-weight:600;flex-shrink:0;border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:7px;transition:background .15s,color .15s;margin-left:auto}
  header.appbar a.portal-btn:hover{background:rgba(255,255,255,.18);color:#fff}
</style>
</head>

<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:.88rem;font-weight:600;display:none;z-index:999;white-space:nowrap"></div>

<script>
// ── PERSISTENCIA localStorage ──────────────────────────────────
const PRE = 'lv_as_';
function lsR(k){try{return JSON.parse(localStorage.getItem(PRE+k))||null}catch{return null}}
function lsW(k,v){
  localStorage.setItem(PRE+k,JSON.stringify(v));
  if(typeof LV_SYNC!=='undefined'){
    var mapa={'asistencia':'lv_as_asistencia','cursos':'lv_as_cursos','estudiantes':'lv_as_estudiantes'};
    var lvKey=mapa[k]||('lv_as_'+k);
    if(Array.isArray(v)){v.forEach(function(r){if(r&&r.id)LV_SYNC.marcarCambio(lvKey,r);});}
    else if(v&&typeof v==='object'){Object.entries(v).forEach(function(e){LV_SYNC.marcarCambio(lvKey,Object.assign({id:e[0]},e[1]));});}
  }
}

// ── ESTADO ────────────────────────────────────────────────────
// Sync bidireccional: al guardar cursos/estudiantes en Asistencia,
// también se escriben en lv_com_ para que Comunicados los vea.
function lsWcom(k,v){try{localStorage.setItem('lv_com_'+k,JSON.stringify(v));}catch(_){}}

// ── Carga de datos ──────────────────────────────────────────
// Prioridad: datos de 01-calificaciones (lv_cursos / lv_estudiantes).
// Fallback: datos propios (lv_as_cursos / lv_as_estudiantes).
function lsR01(k){try{return JSON.parse(localStorage.getItem('lv_'+k))||null}catch{return null}}
function lsW01(k,v){try{localStorage.setItem('lv_'+k,JSON.stringify(v))}catch(_){}}

function cargarCursosDesde01(){
  // Cursos de 01: [{id,nombre,grado,grupo,area,materia,creado}]
  let c01 = lsR01('cursos');
  if(!c01||!c01.length) return null;
  // Cada materia solo ve sus propios cursos (los cursos sin materia,
  // creados antes de que existiera esta separación, siguen viéndose
  // en cualquier lado para no perder datos viejos).
  if(typeof LV_CTX!=='undefined') c01 = LV_CTX.filtrar(c01);
  if(!c01.length) return [];
  return c01.map(c=>({id:c.id,nombre:c.nombre,grado:c.grado||(c.grupo?c.grado+'-'+c.grupo:''),anio:new Date(c.creado||Date.now()).getFullYear()}));
}
function cargarEstDesde01(cursosRef){
  // Estudiantes de 01: [{id,cursoId,nombre,creado}]
  const e01 = lsR01('estudiantes');
  if(!e01||!e01.length) return null;
  const map={};
  e01.forEach(e=>{if(!map[e.cursoId])map[e.cursoId]=[];map[e.cursoId].push({id:e.id,nombre:e.nombre});});
  return map;
}

const _c01 = cargarCursosDesde01();
let cursos      = _c01 || lsR('cursos')      || [];
const _e01 = _c01 ? cargarEstDesde01() : null;
let estudiantes = _e01 || lsR('estudiantes') || {}; // {cursoId: [...]}
let asistencia  = lsR('asistencia')  || {}; // {cursoId_fecha: {registros:[{id,estado}]}}

let cursoActual = null;
let fechaActual = hoy();
let mesVista    = new Date();

function hoy(){return new Date().toISOString().split('T')[0]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

// ── TABS ──────────────────────────────────────────────────────
function tab(t){
  ['registro','estadisticas','cursos'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('hide',x!==t);
  
  if(t==='cursos')_mostrarBannerSync();
});
  document.querySelectorAll('nav.tabs button').forEach((b,i)=>{
    b.classList.toggle('active',['registro','estadisticas','cursos'][i]===t);
  });
  if(t==='estadisticas') renderStats();
  if(t==='cursos') renderCursosList();
}

function hide(el){el.classList.add('hide')}
function show(el){el.classList.remove('hide')}

// ── INICIALIZACIÓN ────────────────────────────────────────────
function init(){
  document.getElementById('inp-fecha').value = fechaActual;
  document.getElementById('inp-fecha').max   = hoy();
  document.getElementById('inp-anio').value  = new Date().getFullYear();
  poblarSelectores();
  renderCalendario();
}

function poblarSelectores(){
  const opts = cursos.map(c=>`<option value="${c.id}">${c.nombre} (${c.grado||''})</option>`).join('');
  const placeholder = '<option value="">— Seleccionar —</option>';
  document.getElementById('sel-curso').innerHTML       = placeholder + opts;
  document.getElementById('sel-curso-stats').innerHTML = placeholder + opts;
  if(cursoActual){
    document.getElementById('sel-curso').value       = cursoActual;
    document.getElementById('sel-curso-stats').value = cursoActual;
  }
}

// ── SELECCIÓN DE CURSO / FECHA ────────────────────────────────
function selCurso(){
  cursoActual = document.getElementById('sel-curso').value || null;
  renderLista();
  renderCalendario();
}

function selFecha(){
  fechaActual = document.getElementById('inp-fecha').value;
  renderLista();
}

// ── LISTA DE ASISTENCIA ───────────────────────────────────────
function renderLista(){
  const wrap = document.getElementById('lista-wrap');
  if(!cursoActual){wrap.innerHTML='<div class="empty">Selecciona un curso.</div>';return;}
  const ests = estudiantes[cursoActual]||[];
  if(!ests.length){wrap.innerHTML='<div class="empty">Sin estudiantes en este grupo.<br>Agrégalos en la pestaña <strong>Cursos y grupos</strong>.</div>';return;}

  const key     = cursoActual+'_'+fechaActual;
  const regHoy  = asistencia[key] || {};
  const estados = regHoy.registros || {};

  const LABELS = {P:{e:'✅',l:'Presente',c:'radio-p'},F:{e:'❌',l:'Falla',c:'radio-f'},T:{e:'⚠️',l:'Tarde',c:'radio-t'},E:{e:'🏥',l:'Excusa',c:'radio-e'}};

  let html = `<div class="leyenda">`;
  for(const[k,v] of Object.entries(LABELS))
    html+=`<span style="color:${k==='P'?'#16a34a':k==='F'?'#dc2626':k==='T'?'#d97706':'#0369a1'}">${v.e} ${v.l}</span>`;
  html+=`</div><div class="tableScroll"><table><thead><tr>
    <th>#</th><th>Estudiante</th>
    ${Object.entries(LABELS).map(([k,v])=>`<th class="c" title="${v.l}">${v.e}</th>`).join('')}
  </tr></thead><tbody>`;

  ests.forEach((est,i)=>{
    const actual = estados[est.id]||'P';
    html+=`<tr><td class="c muted">${i+1}</td><td>${esc(est.nombre)}</td>`;
    for(const k of ['P','F','T','E']){
      html+=`<td class="c"><input type="radio" name="est_${est.id}" value="${k}" class="${LABELS[k].c}" ${actual===k?'checked':''}></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  wrap.innerHTML = html;
}

// ── GUARDAR ───────────────────────────────────────────────────
function guardar(){
  if(!cursoActual){toast('Selecciona un curso primero.');return;}
  const ests = estudiantes[cursoActual]||[];
  if(!ests.length){toast('No hay estudiantes en este grupo.');return;}

  const registros = {};
  ests.forEach(est=>{
    const r = document.querySelector(`input[name="est_${est.id}"]:checked`);
    registros[est.id] = r?r.value:'P';
  });

  const key = cursoActual+'_'+fechaActual;
  if(!asistencia[key]) asistencia[key]={};
  asistencia[key].registros = registros;
  asistencia[key].fecha     = fechaActual;
  asistencia[key].cursoId   = cursoActual;
  lsW('asistencia', asistencia);
  toast('Asistencia guardada ✓');
  renderCalendario();
}

// ── MARCAR TODOS ──────────────────────────────────────────────
function marcarTodos(estado){
  document.querySelectorAll(`input[type=radio][value="${estado}"]`).forEach(r=>r.checked=true);
}

// ── CALENDARIO ────────────────────────────────────────────────
function cambiarMes(d){
  mesVista = new Date(mesVista.getFullYear(), mesVista.getMonth()+d, 1);
  renderCalendario();
}

function renderCalendario(){
  const titulo = document.getElementById('cal-titulo');
  const wrap   = document.getElementById('cal-wrap');
  const MESES  = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  titulo.textContent = `${MESES[mesVista.getMonth()]} ${mesVista.getFullYear()}`;

  const año  = mesVista.getFullYear();
  const mes  = mesVista.getMonth();
  const primer= new Date(año,mes,1).getDay();
  const dias  = new Date(año,mes+1,0).getDate();
  const HOY   = hoy();

  // Fechas con registro para el curso actual
  const conReg = new Set();
  if(cursoActual){
    Object.keys(asistencia).forEach(k=>{
      if(k.startsWith(cursoActual+'_')){
        const f = k.split('_').slice(1).join('_');
        if(f.startsWith(`${año}-${String(mes+1).padStart(2,'0')}`)) conReg.add(f);
      }
    });
  }

  const DIAS_SEM = ['D','L','M','X','J','V','S'];
  let html = `<div class="cal-grid">`;
  DIAS_SEM.forEach(d=>html+=`<div class="cal-head">${d}</div>`);
  for(let i=0;i<primer;i++) html+=`<div></div>`;

  for(let d=1;d<=dias;d++){
    const f = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const esFuturo  = f > HOY;
    const esHoy     = f === HOY;
    const esSel     = f === fechaActual;
    const tieneReg  = conReg.has(f);
    const esFinde   = ((primer+d-1)%7===0)||((primer+d-1)%7===6);

    let cls = 'cal-dia';
    if(!esFuturo) cls += ' clickable';
    if(esSel)     cls += ' seleccionado';
    else if(esHoy) cls += ' hoy';
    else if(tieneReg && !esFuturo) cls += ' con-reg';
    if(esFinde && !esSel && !esHoy) cls += ' muted';

    const punto = tieneReg && !esSel ? `<span class="cal-punto"></span>` : '';
    const click = !esFuturo ? `onclick="diaClick('${f}')"` : '';
    html+=`<div class="${cls}" ${click}>${d}${punto}</div>`;
  }
  html+=`</div>`;
  wrap.innerHTML = html;
}

function diaClick(f){
  fechaActual = f;
  document.getElementById('inp-fecha').value = f;
  renderLista();
  renderCalendario();
}

// ── ESTADÍSTICAS ──────────────────────────────────────────────
function renderStats(){
  const cId  = document.getElementById('sel-curso-stats').value;
  const wrap = document.getElementById('stats-wrap');
  if(!cId){wrap.innerHTML='<div class="empty">Selecciona un curso.</div>';return;}

  const ests = estudiantes[cId]||[];
  if(!ests.length){wrap.innerHTML='<div class="empty">Sin estudiantes en este grupo.</div>';return;}

  // Recolectar todos los registros del curso
  const regs = Object.entries(asistencia)
    .filter(([k])=>k.startsWith(cId+'_'))
    .map(([,v])=>v);

  if(!regs.length){wrap.innerHTML='<div class="empty">Sin registros de asistencia aún.</div>';return;}

  const data = ests.map(est=>{
    const c={P:0,F:0,T:0,E:0};
    regs.forEach(reg=>{
      const e=(reg.registros||{})[est.id]||'P';
      if(c[e]!==undefined) c[e]++;
    });
    const total=c.P+c.F+c.T+c.E;
    const pct=total>0?Math.round((c.P/total)*100):100;
    return{...est,...c,total,pct};
  });

  let html=`<div class="tableScroll"><table>
    <thead><tr><th>#</th><th>Estudiante</th>
      <th class="c">✅ P</th><th class="c">❌ F</th><th class="c">⚠️ T</th><th class="c">🏥 E</th>
      <th class="c">Total días</th><th class="c">% Asistencia</th>
      <th class="c no-print">Acción</th>
    </tr></thead><tbody>`;
  data.forEach((d,i)=>{
    const cls=d.pct>=90?'b-ok':d.pct>=75?'b-warn':'b-bad';
    html+=`<tr>
      <td class="c muted">${i+1}</td><td>${esc(d.nombre)}</td>
      <td class="c" style="color:#16a34a;font-weight:700">${d.P}</td>
      <td class="c" style="color:#dc2626;font-weight:700">${d.F}</td>
      <td class="c" style="color:#d97706;font-weight:700">${d.T}</td>
      <td class="c" style="color:#0369a1;font-weight:700">${d.E}</td>
      <td class="c">${d.total}</td>
      <td class="c"><span class="badge ${cls}">${d.pct}%</span></td>
      <td class="c no-print">${d.pct<75?`<button class="btn sm" style="background:#dc2626;color:#fff;padding:4px 8px;font-size:.72rem" onclick="generarCitacionAuto('${encodeURIComponent(JSON.stringify({cId,nombre:d.nombre,pct:d.pct,fallas:d.F,total:d.total}))}')">📩 Citar</button>`:'<span style="color:var(--muted);font-size:.75rem">—</span>'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  wrap.innerHTML=html;
}

// ── EXPORTAR CSV ──────────────────────────────────────────────
function exportarCSV(){
  const cId = document.getElementById('sel-curso-stats').value;
  if(!cId){toast('Selecciona un curso.');return;}
  const ests = estudiantes[cId]||[];
  if(!ests.length){toast('Sin estudiantes.');return;}

  const regsMap = {};
  Object.entries(asistencia)
    .filter(([k])=>k.startsWith(cId+'_'))
    .forEach(([k,v])=>{const f=k.split('_').slice(1).join('_');regsMap[f]=v.registros||{};});

  const fechas = Object.keys(regsMap).sort();
  const cabecera = ['#','Estudiante',...fechas,'P','F','T','E','% Asist.'];
  const filas = ests.map((est,i)=>{
    const c={P:0,F:0,T:0,E:0};
    const row=[i+1,est.nombre];
    fechas.forEach(f=>{
      const e=(regsMap[f]||{})[est.id]||'—';
      row.push(e);
      if(c[e]!==undefined) c[e]++;
    });
    const tot=c.P+c.F+c.T+c.E;
    const pct=tot>0?Math.round((c.P/tot)*100):100;
    return[...row,c.P,c.F,c.T,c.E,pct+'%'];
  });

  const csv=[cabecera,...filas].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const curso=cursos.find(c=>c.id===cId);
  a.download=`Asistencia_${(curso?.nombre||'Grupo').replace(/\s/g,'_')}_${new Date().getFullYear()}.csv`;
  a.click();
  toast('CSV exportado ✓');
}

// ── GESTIÓN DE CURSOS ─────────────────────────────────────────
function renderCursosList(){
  const wrap=document.getElementById('cursos-wrap');
  if(!cursos.length){wrap.innerHTML='<div class="empty">Sin cursos registrados.</div>';return;}
  let html=`<div class="tableScroll"><table><thead><tr><th>Nombre</th><th>Grado</th><th>Año</th><th class="c">Estudiantes</th><th></th></tr></thead><tbody>`;
  cursos.forEach(c=>{
    const n=(estudiantes[c.id]||[]).length;
    html+=`<tr>
      <td><strong>${esc(c.nombre)}</strong></td>
      <td>${esc(c.grado||'—')}</td>
      <td>${c.anio||'—'}</td>
      <td class="c">${n}</td>
      <td style="white-space:nowrap">
        <button class="btn sec sm" onclick="verEstudiantes('${c.id}')">👥 Estudiantes</button>
        <button class="btn sm" style="background:#dc2626" onclick="eliminarCurso('${c.id}')">✕</button>
      </td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  wrap.innerHTML=html;
}


// ── Sync bidireccional con 01-calificaciones ───────────────

// ── Sincronizar manualmente desde 01-calificaciones ──────────
function sincronizarDesde01(){
  const c01 = cargarCursosDesde01();
  if(!c01||!c01.length){toast('No hay cursos en Calificaciones aún.');return;}
  const e01 = cargarEstDesde01();
  cursos = c01;
  if(e01) estudiantes = e01;
  lsW('cursos',cursos); lsWcom('cursos',cursos);
  lsW('estudiantes',estudiantes); lsWcom('estudiantes',estudiantes);
  poblarSelectores(); renderCursosList();
  toast('✓ Cursos y estudiantes sincronizados desde Calificaciones');
}
function _mostrarBannerSync(){
  const c01=lsR01('cursos');
  const b=document.getElementById('banner-sync-01');
  if(b) b.style.display=(c01&&c01.length)?'flex':'none';
}
function _sincEstudiantes01(){
  // Aplanar {cursoId:[...]} a [{id,cursoId,nombre,creado}]
  const flat=[];
  Object.entries(estudiantes).forEach(([cId,arr])=>{
    (arr||[]).forEach(e=>flat.push({id:e.id,cursoId:cId,nombre:e.nombre,creado:Date.now()}));
  });
  lsW01('estudiantes', flat);
}
function crearCurso(){
  const nombre=document.getElementById('inp-nombre').value.trim();
  const grado =document.getElementById('inp-grado').value.trim();
  const anio  =document.getElementById('inp-anio').value||new Date().getFullYear();
  if(!nombre){toast('Escribe el nombre del curso.');return;}
  const c={id:uid(),nombre,grado,anio};
  cursos.push(c);
  lsW('cursos',cursos); lsWcom('cursos',cursos);
  // Al escribir de vuelta hacia Calificaciones, se etiqueta el curso con
  // el área/materia activa para que quede aislado igual que los demás.
  const _area = (typeof LV_CTX!=='undefined' && LV_CTX.area) || 'Ciencias Sociales';
  const _materia = (typeof LV_CTX!=='undefined' && LV_CTX.materia) || 'Sociales';
  const c01Actual = lsR01('cursos') || [];
  const otros01 = c01Actual.filter(x=>!cursos.some(y=>y.id===x.id));
  lsW01('cursos', otros01.concat(cursos.map(x=>({id:x.id,nombre:x.nombre,grado:x.grado,grupo:'',area:_area,materia:_materia,creado:Date.now()}))));
  document.getElementById('inp-nombre').value='';
  document.getElementById('inp-grado').value='';
  renderCursosList();
  poblarSelectores();
  toast('Curso creado ✓');
}

function eliminarCurso(id){
  if(!confirm('¿Eliminar este curso y todos sus registros de asistencia?')) return;
  cursos=cursos.filter(c=>c.id!==id);
  delete estudiantes[id];
  // Limpiar asistencia de este curso
  Object.keys(asistencia).forEach(k=>{if(k.startsWith(id+'_')) delete asistencia[k];});
  lsW('cursos',cursos); lsWcom('cursos',cursos);
  lsW('estudiantes',estudiantes); lsWcom('estudiantes',estudiantes);
  _sincEstudiantes01();
  lsW('asistencia',asistencia);
  if(cursoActual===id){cursoActual=null;renderLista();}
  renderCursosList();
  poblarSelectores();
  toast('Curso eliminado.');
}

function verEstudiantes(cId){
  cursoActual=cId;
  const curso=cursos.find(c=>c.id===cId);
  document.getElementById('titulo-est').textContent=`Estudiantes — ${curso?.nombre||''}`;
  document.getElementById('card-estudiantes').style.display='block';
  renderListaEst();
  document.getElementById('card-estudiantes').scrollIntoView({behavior:'smooth'});
}

function renderListaEst(){
  const ests=estudiantes[cursoActual]||[];
  const wrap=document.getElementById('lista-estudiantes');
  if(!ests.length){wrap.innerHTML='<p class="muted" style="font-size:.85rem">Sin estudiantes aún.</p>';return;}
  let html=`<table style="font-size:.85rem"><thead><tr><th>#</th><th>Nombre</th><th></th></tr></thead><tbody>`;
  ests.forEach((e,i)=>html+=`<tr><td class="c muted">${i+1}</td><td>${esc(e.nombre)}</td><td><button class="btn sm" style="background:#dc2626;padding:4px 8px" onclick="eliminarEst('${e.id}')">✕</button></td></tr>`);
  html+=`</tbody></table>`;
  wrap.innerHTML=html;
}

function agregarEstudiante(){
  const nombre=document.getElementById('inp-est-nombre').value.trim();
  if(!nombre){toast('Escribe el nombre del estudiante.');return;}
  if(!estudiantes[cursoActual]) estudiantes[cursoActual]=[];
  const nuevoEst={id:uid(),nombre};
  estudiantes[cursoActual].push(nuevoEst);
  lsW('estudiantes',estudiantes); lsWcom('estudiantes',estudiantes);
  _sincEstudiantes01();
  _sincEstudiantes01();
  document.getElementById('inp-est-nombre').value='';
  renderListaEst();
  renderCursosList();
  toast('Estudiante agregado ✓');
}

function cargarMasivo(){
  const txt=document.getElementById('inp-lista-masiva').value;
  const nombres=txt.split('\n').map(n=>n.trim()).filter(n=>n.length>0);
  if(!nombres.length){toast('No hay nombres para cargar.');return;}
  if(!estudiantes[cursoActual]) estudiantes[cursoActual]=[];
  const existentes=new Set(estudiantes[cursoActual].map(e=>e.nombre.toLowerCase()));
  let agregados=0;
  nombres.forEach(nombre=>{
    if(!existentes.has(nombre.toLowerCase())){
      estudiantes[cursoActual].push({id:uid(),nombre});
      existentes.add(nombre.toLowerCase());
      agregados++;
    }
  });
  lsW('estudiantes',estudiantes); lsWcom('estudiantes',estudiantes);
  _sincEstudiantes01();
  document.getElementById('inp-lista-masiva').value='';
  renderListaEst();
  renderCursosList();
  toast(`${agregados} estudiante(s) agregado(s) ✓`);
}

function eliminarEst(id){
  if(!confirm('¿Eliminar este estudiante?')) return;
  estudiantes[cursoActual]=(estudiantes[cursoActual]||[]).filter(e=>e.id!==id);
  lsW('estudiantes',estudiantes); lsWcom('estudiantes',estudiantes);
  _sincEstudiantes01();
  renderListaEst();
  renderCursosList();
  toast('Estudiante eliminado.');
}

// ── UTILIDADES ────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}

// ── ARRANQUE ──────────────────────────────────────────────────
init();
</script>
