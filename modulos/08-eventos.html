<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos — Loma Verde</title>
<style>
:root{
  --primary:#1e3a8a;--primary-light:#3b82f6;--bg:#f1f5f9;--surface:#fff;
  --text:#1f2937;--muted:#64748b;--border:#e2e8f0;
  --ok:#16a34a;--bad:#dc2626;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --c-reunion:#7c3aed;--c-reunion-bg:#ede9fe;
  --c-academico:#0369a1;--c-academico-bg:#e0f2fe;
  --c-entrega:#b45309;--c-entrega-bg:#fef3c7;
  --c-festivo:#065f46;--c-festivo-bg:#d1fae5;
  --c-externo:#9f1239;--c-externo-bg:#ffe4e6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
header.appbar{background:var(--primary);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header.appbar h1{font-size:1.1rem;font-weight:700;flex:1}
header.appbar .pill{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:999px;font-size:.78rem}
a.portal-btn{color:rgba(255,255,255,.85);text-decoration:none;font-size:.82rem;font-weight:600;border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:7px;margin-left:auto}
a.portal-btn:hover{background:rgba(255,255,255,.18)}
nav.tabs{display:flex;gap:4px;background:var(--surface);padding:6px;overflow-x:auto;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
nav.tabs button{border:0;background:transparent;padding:10px 16px;border-radius:8px;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
nav.tabs button.active{background:var(--primary);color:#fff}
main{max-width:1100px;margin:0 auto;padding:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.card h2{margin:0 0 14px;font-size:1.05rem;color:var(--primary)}
.row{display:flex;gap:12px;flex-wrap:wrap}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:.82rem;font-weight:600;color:var(--muted);flex:1;min-width:140px}
input,select,textarea{padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:.92rem;width:100%;background:#fff;color:var(--text);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
textarea{resize:vertical;min-height:70px}
.btn{border:0;border-radius:8px;padding:9px 16px;font-size:.88rem;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;display:inline-flex;align-items:center;gap:6px}
.btn.sec{background:#e2e8f0;color:var(--text)}
.btn.ok{background:var(--ok)}
.btn.bad{background:var(--bad)}
.btn.sm{padding:5px 10px;font-size:.78rem}
.btn:hover{filter:brightness(1.07)}
.hide{display:none!important}
.muted{color:var(--muted);font-size:.82rem}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.9rem}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:700}
/* Categorías */
.cat-reunion   {background:var(--c-reunion-bg);  color:var(--c-reunion)}
.cat-academico {background:var(--c-academico-bg);color:var(--c-academico)}
.cat-entrega   {background:var(--c-entrega-bg);  color:var(--c-entrega)}
.cat-festivo   {background:var(--c-festivo-bg);  color:var(--c-festivo)}
.cat-externo   {background:var(--c-externo-bg);  color:var(--c-externo)}
/* Calendario */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav h3{font-size:1.05rem;font-weight:800;color:var(--primary);text-transform:capitalize}
.btn-nav{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.9rem;color:var(--muted)}
.btn-nav:hover{background:var(--bg)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{text-align:center;font-size:.72rem;font-weight:700;color:var(--muted);padding:6px 0;text-transform:uppercase}
.cal-dia{min-height:80px;border:1px solid var(--border);border-radius:8px;padding:5px;cursor:pointer;transition:background .12s;background:var(--surface)}
.cal-dia:hover{background:#f0f4ff}
.cal-dia.hoy{border:2px solid var(--primary)}
.cal-dia.otro-mes{background:#f8fafc;opacity:.5}
.cal-num{font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.cal-dia.hoy .cal-num{color:var(--primary)}
.hoy-pill{background:var(--primary);color:#fff;border-radius:999px;padding:1px 7px;font-size:.68rem}
.ev-chip{font-size:.62rem;font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;line-height:1.4}
.ev-mas{font-size:.62rem;color:var(--muted);font-weight:600;margin-top:1px}
/* Lista */
.ev-item{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface)}
.ev-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ev-fecha-col{text-align:center;min-width:48px;flex-shrink:0}
.ev-dia-n{font-size:1.4rem;font-weight:800;color:var(--primary);line-height:1}
.ev-mes-n{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase}
.ev-body{flex:1}
.ev-titulo{font-weight:700;font-size:.92rem;margin-bottom:3px}
.ev-desc{font-size:.8rem;color:var(--muted)}
.ev-actions{display:flex;gap:5px;flex-shrink:0}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:16px;padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 16px;color:var(--primary)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
/* Leyenda */
.leyenda{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.leyenda-it{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:999px;cursor:pointer;border:2px solid transparent;transition:opacity .12s}
.leyenda-it.off{opacity:.3}
@media(max-width:700px){.cal-dia{min-height:52px}.ev-chip{display:none}main{padding:10px}}
@media print{header.appbar,nav.tabs,.no-print{display:none!important}body{background:#fff}}
</style>
</head>
<body>

<header class="appbar">
  <img src="../Logo/logo.jpg" alt="Logo" style="width:34px;height:34px;object-fit:contain;border-radius:6px;background:#fff;padding:2px;flex-shrink:0">
  <h1>Eventos Institucionales</h1>
  <span class="pill">I.E. San José de Loma Verde</span>
  <a href="../index.html" class="portal-btn">← Portal</a>
</header>

<nav class="tabs">
  <button class="active" onclick="switchTab('calendario')">📅 Calendario</button>
  <button onclick="switchTab('lista')">📋 Lista</button>
  <button onclick="switchTab('nuevo')">➕ Nuevo evento</button>
</nav>

<main>

<section id="tab-calendario">
  <div class="card" style="padding:14px">
    <div class="cal-nav">
      <button class="btn-nav" onclick="mesAnterior()">‹ Anterior</button>
      <h3 id="cal-titulo"></h3>
      <button class="btn-nav" onclick="mesSiguiente()">Siguiente ›</button>
    </div>
    <div class="leyenda no-print" id="leyenda-wrap">
      <span class="leyenda-it cat-reunion"   data-cat="reunion"   onclick="toggleCat(this)">👥 Reunión de padres</span>
      <span class="leyenda-it cat-academico" data-cat="academico" onclick="toggleCat(this)">📘 Académico</span>
      <span class="leyenda-it cat-entrega"   data-cat="entrega"   onclick="toggleCat(this)">📋 Fecha de entrega</span>
      <span class="leyenda-it cat-festivo"   data-cat="festivo"   onclick="toggleCat(this)">🎉 Festivo / Sin clase</span>
      <span class="leyenda-it cat-externo"   data-cat="externo"   onclick="toggleCat(this)">🌐 Externo</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap" class="no-print">
    <button class="btn sm sec" onclick="window.print()">🖨️ Imprimir</button>
    <button class="btn sm ok" onclick="switchTab('nuevo')">➕ Nuevo evento</button>
  </div>
</section>

<section id="tab-lista" class="hide">
  <div class="card">
    <div class="row" style="margin-bottom:12px;align-items:flex-end">
      <label class="fld">Filtrar por categoría
        <select id="fil-cat" onchange="renderLista()">
          <option value="">Todas las categorías</option>
          <option value="reunion">Reunión de padres</option>
          <option value="academico">Académico</option>
          <option value="entrega">Fecha de entrega</option>
          <option value="festivo">Festivo / Sin clase</option>
          <option value="externo">Externo</option>
        </select>
      </label>
      <label class="fld">Filtrar por mes
        <input type="month" id="fil-mes" onchange="renderLista()">
      </label>
      <label class="fld">Filtrar por materia
        <select id="fil-materia" onchange="renderLista()">
          <option value="">Todas / Institucional</option>
        </select>
      </label>
      <div style="align-self:flex-end">
        <button class="btn sm ok" onclick="switchTab('nuevo')">➕ Agregar</button>
      </div>
    </div>
    <div id="lista-wrap"></div>
  </div>
</section>

<section id="tab-nuevo" class="hide">
  <div class="card">
    <h2 id="form-titulo">Nuevo evento</h2>
    <div class="row" style="margin-bottom:12px">
      <label class="fld" style="flex:2">Título del evento *
        <input id="f-titulo" placeholder="Ej: Reunión de padres de 9°">
      </label>
      <label class="fld">Categoría
        <select id="f-cat">
          <option value="reunion">👥 Reunión de padres</option>
          <option value="academico">📘 Académico</option>
          <option value="entrega">📋 Fecha de entrega</option>
          <option value="festivo">🎉 Festivo / Sin clase</option>
          <option value="externo">🌐 Externo</option>
        </select>
      </label>
    </div>
    <div class="row" style="margin-bottom:12px">
      <label class="fld">Área (opcional, para clasificar)
        <select id="f-area"><option value="">General / Institucional</option></select>
      </label>
      <label class="fld">Materia (opcional)
        <select id="f-materia"><option value="">—</option></select>
      </label>
    </div>
    <div class="row" style="margin-bottom:12px">
      <label class="fld">Fecha inicio *
        <input type="date" id="f-fecha-ini">
      </label>
      <label class="fld">Fecha fin (opcional)
        <input type="date" id="f-fecha-fin">
      </label>
      <label class="fld">Hora (opcional)
        <input type="time" id="f-hora">
      </label>
    </div>
    <div class="row" style="margin-bottom:12px">
      <label class="fld">Descripción / Notas
        <textarea id="f-desc" placeholder="Detalles del evento, lugar, preparación necesaria…"></textarea>
      </label>
    </div>
    <div class="row" style="margin-bottom:14px">
      <label class="fld">Recordatorio
        <select id="f-rec">
          <option value="1">1 día antes</option>
          <option value="2">2 días antes</option>
          <option value="3">3 días antes</option>
          <option value="7">1 semana antes</option>
          <option value="0">Solo el día del evento</option>
        </select>
      </label>
      <label class="fld">Visible en portal
        <select id="f-portal">
          <option value="1">Sí — mostrar recordatorio</option>
          <option value="0">No — solo en este módulo</option>
        </select>
      </label>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ok" onclick="guardarEvento()">💾 Guardar evento</button>
      <button class="btn sec" onclick="limpiarForm()">✕ Limpiar</button>
    </div>
    <div id="form-flag" style="font-size:.8rem;color:var(--ok);margin-top:8px;font-weight:600"></div>
  </div>
</section>

</main>

<!-- Modal detalle -->
<div class="modal-bg hide" id="modal-ev">
  <div class="modal">
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn sec" onclick="cerrarModal()">Cerrar</button>
      <button class="btn" id="modal-edit">✏️ Editar</button>
      <button class="btn bad" id="modal-del">🗑️ Eliminar</button>
    </div>
  </div>
</div>

<script>
var LS_KEY = 'lv_eventos';
var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var CAT = {
  reunion:   {label:'Reunión de padres', cls:'cat-reunion',   bg:'#ede9fe', color:'#7c3aed'},
  academico: {label:'Académico',         cls:'cat-academico', bg:'#e0f2fe', color:'#0369a1'},
  entrega:   {label:'Fecha de entrega',  cls:'cat-entrega',   bg:'#fef3c7', color:'#b45309'},
  festivo:   {label:'Festivo/Sin clase', cls:'cat-festivo',   bg:'#d1fae5', color:'#065f46'},
  externo:   {label:'Externo',           cls:'cat-externo',   bg:'#ffe4e6', color:'#9f1239'}
};

function lsR(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];}}
function lsW(d){
  try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}
  if(typeof LV_SYNC!=='undefined'&&Array.isArray(d)){
    d.forEach(function(r){if(r&&r.id)LV_SYNC.marcarCambio('lv_eventos',r);});
  }
}
var eventos = lsR();

var AREAS_EV = [
  { nombre:'Primaria',                     materias:['Todas las materias'] },
  { nombre:'Ciencias Sociales',            materias:['Sociales','Competencias Ciudadanas','Filosofía'] },
  { nombre:'Ciencias Naturales',           materias:['Biología','Naturales','Química','Física'] },
  { nombre:'Humanidades',                  materias:['Lengua Castellana','Plan Lector','Inglés'] },
  { nombre:'Matemáticas',                  materias:['Matemáticas','Geometría','Estadística'] },
  { nombre:'Tecnología e Informática',     materias:['Tecnología e Informática'] },
  { nombre:'Artística y Emprendimiento',   materias:['Artística y Emprendimiento'] },
  { nombre:'Religión',                     materias:['Religión'] },
  { nombre:'Ética',                        materias:['Ética'] },
  { nombre:'Educación Física',             materias:['Educación Física'] },
];

function fillAreaEvSelects(){
  var opts = AREAS_EV.map(function(a){return '<option value="'+esc(a.nombre)+'">'+esc(a.nombre)+'</option>';}).join('');
  document.getElementById('f-area').innerHTML = '<option value="">General / Institucional</option>' + opts;
  document.getElementById('f-area').addEventListener('change', fillMateriaEvSelect);
  fillMateriaEvSelect();

  var todasMaterias = [];
  AREAS_EV.forEach(function(a){ a.materias.forEach(function(m){ if(todasMaterias.indexOf(m)===-1) todasMaterias.push(m); }); });
  var filSel = document.getElementById('fil-materia');
  filSel.innerHTML = '<option value="">Todas / Institucional</option>' + todasMaterias.map(function(m){return '<option value="'+esc(m)+'">'+esc(m)+'</option>';}).join('');
}
function fillMateriaEvSelect(){
  var areaVal = document.getElementById('f-area').value;
  var area = null;
  for(var i=0;i<AREAS_EV.length;i++){ if(AREAS_EV[i].nombre===areaVal){ area=AREAS_EV[i]; break; } }
  var sel = document.getElementById('f-materia');
  if(!area){ sel.innerHTML = '<option value="">—</option>'; return; }
  sel.innerHTML = area.materias.map(function(m){return '<option value="'+esc(m)+'">'+esc(m)+'</option>';}).join('');
}
fillAreaEvSelects();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function hoyISO(){return new Date().toISOString().split('T')[0];}
function toast(msg){
  var el=document.createElement('div');
  el.textContent=msg;
  el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a8a;color:#fff;padding:10px 22px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},2500);
}

/* ══ TABS ══════════════════════════════════════ */
function switchTab(t){
  var tabs = ['calendario','lista','nuevo'];
  tabs.forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('hide', x!==t);
  });
  document.querySelectorAll('nav.tabs button').forEach(function(b,i){
    b.classList.toggle('active', tabs[i]===t);
  });
  if(t==='calendario') renderCalendario();
  if(t==='lista')      renderLista();
}

/* ══ CALENDARIO ════════════════════════════════ */
var mesActual = new Date(); mesActual.setDate(1);
var catsOff = {};

function mesAnterior(){mesActual.setMonth(mesActual.getMonth()-1); renderCalendario();}
function mesSiguiente(){mesActual.setMonth(mesActual.getMonth()+1); renderCalendario();}

function toggleCat(el){
  var cat = el.dataset.cat;
  catsOff[cat] = !catsOff[cat];
  el.classList.toggle('off', !!catsOff[cat]);
  renderCalendario();
}

function enRango(ev, fecha){
  return fecha >= ev.fechaIni && fecha <= (ev.fechaFin || ev.fechaIni);
}

function renderCalendario(){
  var anio = mesActual.getFullYear();
  var mes  = mesActual.getMonth();
  document.getElementById('cal-titulo').textContent = MESES[mes] + ' ' + anio;

  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Cabeceras
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(function(d){
    var h = document.createElement('div');
    h.className = 'cal-dh';
    h.textContent = d;
    grid.appendChild(h);
  });

  var hoy = hoyISO();
  var primerDia = new Date(anio, mes, 1);
  var totalDias = new Date(anio, mes+1, 0).getDate();
  var offset = primerDia.getDay() - 1;
  if(offset < 0) offset = 6;

  // Días mes anterior
  for(var i=0; i<offset; i++){
    var d = new Date(anio, mes, -(offset-i-1));
    grid.appendChild(buildCelda(d, true, hoy));
  }
  // Días del mes
  for(var day=1; day<=totalDias; day++){
    grid.appendChild(buildCelda(new Date(anio, mes, day), false, hoy));
  }
  // Relleno
  var total = offset + totalDias;
  var resto = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(var j=1; j<=resto; j++){
    grid.appendChild(buildCelda(new Date(anio, mes+1, j), true, hoy));
  }
}

function buildCelda(fecha, otroMes, hoy){
  // Build YYYY-MM-DD without timezone issues
  var y = fecha.getFullYear();
  var m = String(fecha.getMonth()+1).padStart(2,'0');
  var d = String(fecha.getDate()).padStart(2,'0');
  var fechaStr = y+'-'+m+'-'+d;
  var esHoy = fechaStr === hoy;

  var cel = document.createElement('div');
  cel.className = 'cal-dia' + (otroMes?' otro-mes':'') + (esHoy?' hoy':'');

  var numDiv = document.createElement('div');
  numDiv.className = 'cal-num';
  if(esHoy){
    var pill = document.createElement('span');
    pill.className = 'hoy-pill';
    pill.textContent = fecha.getDate();
    numDiv.appendChild(pill);
  } else {
    numDiv.textContent = fecha.getDate();
  }
  cel.appendChild(numDiv);

  var evDia = eventos.filter(function(ev){
    return !catsOff[ev.cat] && enRango(ev, fechaStr);
  });

  var maxVis = 3;
  evDia.slice(0, maxVis).forEach(function(ev){
    var ci = CAT[ev.cat] || CAT.externo;
    var chip = document.createElement('span');
    chip.className = 'ev-chip ' + ci.cls;
    chip.textContent = (ev.hora ? ev.hora + ' ' : '') + ev.titulo;
    chip.title = ev.titulo;
    (function(id){ chip.onclick = function(e){ e.stopPropagation(); abrirModal(id); }; })(ev.id);
    cel.appendChild(chip);
  });
  if(evDia.length > maxVis){
    var mas = document.createElement('div');
    mas.className = 'ev-mas';
    mas.textContent = '+' + (evDia.length - maxVis) + ' más';
    cel.appendChild(mas);
  }

  (function(fs){
    cel.onclick = function(){
      document.getElementById('f-fecha-ini').value = fs;
      switchTab('nuevo');
    };
  })(fechaStr);
  return cel;
}

/* ══ LISTA ══════════════════════════════════════ */
function renderLista(){
  var wrap = document.getElementById('lista-wrap');
  var filCat = document.getElementById('fil-cat').value;
  var filMes = document.getElementById('fil-mes').value;
  var filMateria = document.getElementById('fil-materia').value;
  var hoy = hoyISO();

  var evs = eventos.slice().filter(function(e){
    if(filCat && e.cat !== filCat) return false;
    if(filMes && e.fechaIni.slice(0,7) !== filMes) return false;
    if(filMateria && e.materia !== filMateria) return false;
    return true;
  });
  evs.sort(function(a,b){ return a.fechaIni.localeCompare(b.fechaIni); });

  if(!evs.length){
    wrap.innerHTML = '<div class="empty">No hay eventos con esos filtros.</div>';
    return;
  }

  var html = '';
  evs.forEach(function(ev){
    var ci = CAT[ev.cat] || CAT.externo;
    var partes = ev.fechaIni.split('-');
    var dia = parseInt(partes[2], 10);
    var mesIdx = parseInt(partes[1], 10) - 1;
    var pasado = (ev.fechaFin || ev.fechaIni) < hoy;
    var hasta = (ev.fechaFin && ev.fechaFin !== ev.fechaIni) ? ' <span class="muted">→ '+ev.fechaFin+'</span>' : '';

    html += '<div class="ev-item" style="'+(pasado?'opacity:.55':'')+'">'
      + '<div class="ev-fecha-col">'
      +   '<div class="ev-dia-n">' + dia + '</div>'
      +   '<div class="ev-mes-n">' + MESES[mesIdx].slice(0,3) + '</div>'
      + '</div>'
      + '<div class="ev-body">'
      +   '<div class="ev-titulo">' + esc(ev.titulo) + '</div>'
      +   '<div style="margin:3px 0">'
      +     '<span class="badge '+ci.cls+'">'+ci.label+'</span>'
      +     (ev.materia ? '<span class="badge" style="margin-left:6px;background:#f1f5f9;color:#334155">'+esc(ev.materia)+'</span>' : '')
      +     (ev.hora ? '<span class="muted" style="margin-left:6px">🕐 '+ev.hora+'</span>' : '')
      +     hasta
      +   '</div>'
      +   (ev.desc ? '<div class="ev-desc">'+esc(ev.desc)+'</div>' : '')
      + '</div>'
      + '<div class="ev-actions">'
      +   '<button class="btn sm sec" onclick="editarEvento(&#39;'+ev.id+'&#39;)">✏️</button>'
      +   '<button class="btn sm bad" onclick="eliminarEvento(&#39;'+ev.id+'&#39;)">🗑️</button>'
      + '</div>'
      + '</div>';
  });
  wrap.innerHTML = html;
}

/* ══ FORMULARIO ═════════════════════════════════ */
var editId = null;

function limpiarForm(){
  editId = null;
  document.getElementById('f-titulo').value = '';
  document.getElementById('f-fecha-ini').value = hoyISO();
  document.getElementById('f-fecha-fin').value = '';
  document.getElementById('f-hora').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-cat').value = 'reunion';
  document.getElementById('f-rec').value = '1';
  document.getElementById('f-portal').value = '1';
  document.getElementById('f-area').value = '';
  fillMateriaEvSelect();
  document.getElementById('form-titulo').textContent = 'Nuevo evento';
  document.getElementById('form-flag').textContent = '';
}

function guardarEvento(){
  var titulo = document.getElementById('f-titulo').value.trim();
  var fechaIni = document.getElementById('f-fecha-ini').value;
  if(!titulo){ toast('Escribe el título del evento.'); return; }
  if(!fechaIni){ toast('Indica la fecha del evento.'); return; }
  var fechaFin = document.getElementById('f-fecha-fin').value || fechaIni;
  if(fechaFin < fechaIni) fechaFin = fechaIni;

  var ev = {
    id: editId || uid(),
    titulo: titulo,
    cat: document.getElementById('f-cat').value,
    area: document.getElementById('f-area').value,
    materia: document.getElementById('f-materia').value,
    fechaIni: fechaIni,
    fechaFin: fechaFin,
    hora: document.getElementById('f-hora').value,
    desc: document.getElementById('f-desc').value.trim(),
    rec: parseInt(document.getElementById('f-rec').value, 10),
    portal: document.getElementById('f-portal').value === '1',
    creado: Date.now()
  };

  if(editId){
    var idx = -1;
    for(var i=0;i<eventos.length;i++){ if(eventos[i].id===editId){idx=i;break;} }
    if(idx >= 0) eventos[idx] = ev;
  } else {
    eventos.push(ev);
  }
  lsW(eventos);
  limpiarForm();
  document.getElementById('form-flag').textContent = '✅ Evento guardado.';
  toast('Evento guardado ✓');
  setTimeout(function(){ switchTab('calendario'); }, 700);
}

function editarEvento(id){
  var ev = null;
  for(var i=0;i<eventos.length;i++){ if(eventos[i].id===id){ev=eventos[i];break;} }
  if(!ev) return;
  editId = id;
  document.getElementById('f-titulo').value = ev.titulo;
  document.getElementById('f-cat').value = ev.cat;
  document.getElementById('f-area').value = ev.area || '';
  fillMateriaEvSelect();
  document.getElementById('f-materia').value = ev.materia || '';
  document.getElementById('f-fecha-ini').value = ev.fechaIni;
  document.getElementById('f-fecha-fin').value = ev.fechaFin || '';
  document.getElementById('f-hora').value = ev.hora || '';
  document.getElementById('f-desc').value = ev.desc || '';
  document.getElementById('f-rec').value = String(ev.rec != null ? ev.rec : 1);
  document.getElementById('f-portal').value = ev.portal ? '1' : '0';
  document.getElementById('form-titulo').textContent = 'Editar evento';
  document.getElementById('form-flag').textContent = '';
  cerrarModal();
  switchTab('nuevo');
}

function eliminarEvento(id){
  if(!confirm('¿Eliminar este evento?')) return;
  const _r=eventos.find(function(e){return e.id===id;});if(_r&&typeof LV_SYNC!=='undefined')LV_SYNC.marcarCambio('lv_eventos',Object.assign({},_r,{_eliminado:true}));
  eventos = eventos.filter(function(e){ return e.id !== id; });
  lsW(eventos);
  cerrarModal();
  renderLista();
  renderCalendario();
  toast('Evento eliminado');
}

/* ══ MODAL ══════════════════════════════════════ */
function abrirModal(id){
  var ev = null;
  for(var i=0;i<eventos.length;i++){ if(eventos[i].id===id){ev=eventos[i];break;} }
  if(!ev) return;
  var ci = CAT[ev.cat] || CAT.externo;
  var partes = ev.fechaIni.split('-');
  var fmtFecha = parseInt(partes[2],10)+' de '+MESES[parseInt(partes[1],10)-1]+' de '+partes[0];
  var hasta = (ev.fechaFin && ev.fechaFin !== ev.fechaIni) ? ' → ' + ev.fechaFin : '';
  var recTxt = ev.rec === 0 ? 'Solo el día del evento' : ev.rec + ' día(s) antes';

  document.getElementById('modal-body').innerHTML =
    '<h3 style="margin-bottom:12px">'+esc(ev.titulo)+'</h3>'
    +'<p style="margin-bottom:8px"><span class="badge '+ci.cls+'">'+ci.label+'</span></p>'
    +'<p style="font-size:.88rem;margin-bottom:6px">📅 '+fmtFecha+hasta+'</p>'
    +(ev.hora ? '<p style="font-size:.88rem;margin-bottom:6px">🕐 '+ev.hora+'</p>' : '')
    +(ev.desc ? '<p style="font-size:.85rem;color:var(--muted);margin-top:10px;white-space:pre-wrap">'+esc(ev.desc)+'</p>' : '')
    +'<p style="font-size:.75rem;color:var(--muted);margin-top:14px">🔔 Recordatorio: '+recTxt+'</p>';

  document.getElementById('modal-edit').onclick = function(){ editarEvento(id); };
  document.getElementById('modal-del').onclick  = function(){ eliminarEvento(id); };
  document.getElementById('modal-ev').classList.remove('hide');
}

function cerrarModal(){
  document.getElementById('modal-ev').classList.add('hide');
}
document.getElementById('modal-ev').addEventListener('click', function(e){
  if(e.target === document.getElementById('modal-ev')) cerrarModal();
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape') cerrarModal(); });

/* ══ ARRANQUE ═══════════════════════════════════ */
document.getElementById('f-fecha-ini').value = hoyISO();
document.getElementById('fil-mes').value = new Date().toISOString().slice(0,7);
renderCalendario();
</script>

<script src="../sync.js"></script>
