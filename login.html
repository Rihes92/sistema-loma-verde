<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ingresar — SABIE</title>
<style>
  :root{
    --primary:#1e3a8a; --primary-dark:#172d6e; --primary-light:#3b82f6;
    --bg:#f1f5f9; --surface:#fff; --text:#1f2937; --muted:#64748b;
    --border:#e2e8f0; --bad:#dc2626; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;display:flex;min-height:100vh;background:var(--bg);color:var(--text)}

  /* ── Panel de marca ── */
  .brand{flex:1.15;background:linear-gradient(150deg,var(--primary-dark) 0%,var(--primary) 55%,var(--primary-light) 130%);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:56px 60px;position:relative;overflow:hidden}
  .brand::before{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,.05);top:-140px;right:-120px}
  .brand::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-110px;left:-90px}
  .brand-inner{position:relative;z-index:1;max-width:440px;margin:0 auto;text-align:center}
  .brand img.logo-full{width:min(420px,88%);height:auto;aspect-ratio:1/1;object-fit:contain;border-radius:28px;box-shadow:0 12px 44px rgba(0,0,0,.35);display:block;margin:0 auto}

  /* ── Panel del formulario ── */
  .panel{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 24px}
  .card{width:100%;max-width:400px}
  .card .hola{font-size:1.45rem;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.01em}
  .card .sub{color:var(--muted);font-size:.9rem;margin-bottom:28px}
  label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px;margin-top:18px}
  .inp-wrap{position:relative}
  input{width:100%;padding:12px 14px;border:1.5px solid #cbd5e1;border-radius:10px;font-size:.95rem;background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s}
  input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 4px rgba(59,130,246,.13)}
  .inp-wrap input{padding-right:46px}
  .ver-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:transparent;cursor:pointer;font-size:1.05rem;padding:8px;color:var(--muted);border-radius:8px;line-height:1}
  .ver-btn:hover{background:#f1f5f9}
  button[type=submit]{width:100%;margin-top:26px;border:0;border-radius:10px;padding:13px;font-size:.98rem;font-weight:700;cursor:pointer;background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(30,58,138,.3);transition:filter .15s,transform .1s}
  button[type=submit]:hover{filter:brightness(1.1)}
  button[type=submit]:active{transform:translateY(1px)}
  button[type=submit]:disabled{opacity:.6;cursor:wait}
  .err{color:var(--bad);font-size:.83rem;margin-top:14px;text-align:center;min-height:1.2em;line-height:1.4}
  .nota{font-size:.78rem;color:var(--muted);text-align:center;margin-top:22px;line-height:1.6}
  .nota a{color:var(--primary);font-weight:700;text-decoration:none}
  .nota a:hover{text-decoration:underline}
  .brand-movil{display:none}

  /* ── Móvil / tableta vertical ── */
  @media(max-width:880px){
    body{flex-direction:column}
    .brand{display:none}
    .brand-movil{display:flex;flex-direction:column;align-items:center;text-align:center;background:linear-gradient(150deg,var(--primary-dark),var(--primary) 70%,var(--primary-light) 160%);color:#fff;padding:34px 24px 30px}
    .brand-movil img{width:min(230px,60%);height:auto;aspect-ratio:1/1;object-fit:contain;border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .panel{align-items:flex-start;padding-top:30px}
  }
</style>
<link rel="stylesheet" href="lv-tema.css">
</head>
<body>

<!-- Marca (escritorio) -->
<aside class="brand">
  <div class="brand-inner">
    <img class="logo-full" src="Logo/sabie-full.jpg" width="1024" height="1024" alt="SABIE — Sistema de Aprendizaje, Bienestar e Inclusión Educativa">
  </div>
</aside>

<!-- Marca (móvil) -->
<header class="brand-movil">
  <img src="Logo/sabie-full.jpg" width="1024" height="1024" alt="SABIE — Sistema de Aprendizaje, Bienestar e Inclusión Educativa">
</header>

<!-- Formulario -->
<section class="panel">
  <div class="card">
    <div class="hola">¡Bienvenido(a)! 👋</div>
    <p class="sub">Ingresa con tu cuenta para continuar.</p>

    <form id="form-login">
      <label for="l-email">Correo institucional</label>
      <input type="email" id="l-email" required placeholder="tu.correo@ejemplo.com" autocomplete="username" autocapitalize="none">

      <label for="l-clave">Contraseña</label>
      <div class="inp-wrap">
        <input type="password" id="l-clave" required placeholder="Tu contraseña" autocomplete="current-password">
        <button type="button" class="ver-btn" id="ver-clave" aria-label="Mostrar contraseña" title="Mostrar contraseña">👁️</button>
      </div>

      <button type="submit" id="l-btn">Entrar</button>
      <div class="err" id="l-error" role="alert"></div>
    </form>

    <p class="nota"><a href="recuperar.html">¿Olvidaste tu contraseña?</a> · <a href="diagnostico.html">🩺 Diagnóstico</a><br>Si tu correo no es real (asignado por la institución), pide a Coordinación que te la restablezca.</p>
  </div>
</section>

<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js")}</script>
<script src="auth.js"></script>
<script src="sync.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  Login con Supabase Auth (usuario y contraseña reales, validados
//  en el servidor). Reemplaza el login anterior, que comparaba
//  claves guardadas en texto plano en el navegador.
//
//  Después de autenticar:
//   1. Descarga los datos (ya firmados con el token del docente).
//   2. Busca el registro del docente por su correo en lv_docentes
//      para conservar el filtrado de menú por asignaciones.
//   3. Lee su rol en la tabla `perfiles` (docente / coordinador /
//      admin) — el rol de administrador ya no depende de una clave
//      maestra escrita en el código.
// ═══════════════════════════════════════════════════════════════

// si ya hay sesión, saltar directo al portal
if (LV_AUTH.haySesion() && localStorage.getItem('lv_login')) location.replace('index.html');

// mostrar / ocultar contraseña
document.getElementById('ver-clave').addEventListener('click', function(){
  const inp = document.getElementById('l-clave');
  const ver = inp.type === 'password';
  inp.type = ver ? 'text' : 'password';
  this.textContent = ver ? '🙈' : '👁️';
  this.setAttribute('aria-label', ver ? 'Ocultar contraseña' : 'Mostrar contraseña');
});

function lsRead(k){ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch(_){ return []; } }

async function leerRol(userId){
  try{
    const t = await LV_AUTH.getValidToken();
    const r = await fetch(`${LV_AUTH.URL}/rest/v1/perfiles?id=eq.${encodeURIComponent(userId)}&select=rol`, {
      headers: { 'apikey': LV_AUTH.KEY, 'Authorization': 'Bearer ' + t }
    });
    if(!r.ok) return 'docente';
    const rows = await r.json();
    return (rows[0] && rows[0].rol) || 'docente';
  }catch(_){ return 'docente'; }
}

document.getElementById('form-login').addEventListener('submit', async e=>{
  e.preventDefault();
  const errBox = document.getElementById('l-error');
  const btn = document.getElementById('l-btn');
  errBox.textContent=''; btn.disabled=true; btn.textContent='Verificando…';
  try{
    const email = document.getElementById('l-email').value.trim().toLowerCase();
    const user = await LV_AUTH.login(email, document.getElementById('l-clave').value);

    btn.textContent='Cargando tus datos…';
    // bajar datos con el token recién obtenido (incluye lv_docentes)
    try{ await Promise.race([ LV_SYNC.descargarTodo(), new Promise(res=>setTimeout(res, 12000)) ]); }catch(_){}

    const rol = await leerRol(user.id);
    const esAdmin = (rol==='admin' || rol==='coordinador');

    // mapear el usuario a su registro de docente (para el menú filtrado)
    const docentes = lsRead('lv_docentes');
    const d = docentes.find(x => (x.email||'').trim().toLowerCase() === email);

    if(!d && !esAdmin){
      errBox.textContent = 'Tu usuario es válido, pero no está vinculado a ningún docente. Pide a Coordinación que registre tu correo ('+email+') en tu ficha de docente.';
      btn.disabled=false; btn.textContent='Entrar';
      return;
    }

    localStorage.setItem('lv_login', JSON.stringify({
      docenteId: d ? d.id : null,
      nombre: d ? d.nombre : (esAdmin ? 'Administración' : email),
      esAdmin: esAdmin
    }));
    location.href='index.html';
  }catch(err){
    // Distinguir "sin internet" de "contraseña incorrecta": la verificación
    // de contraseña siempre ocurre en el servidor, así que sin conexión no
    // hay forma de validarla (el modo sin internet funciona DESPUÉS de haber
    // iniciado sesión una vez en este dispositivo).
    const esRed = !navigator.onLine || /load failed|failed to fetch|networkerror|abort|timeout|network/i.test(String(err&&err.message||''));
    errBox.textContent = esRed
      ? '📵 No hay conexión a internet. Iniciar sesión requiere internet. Si ya habías entrado antes en este dispositivo, la app abre sola sin pedir contraseña; si te la está pidiendo, tu sesión se cerró y necesitas conexión para entrar de nuevo.'
      : (err.message || 'No se pudo iniciar sesión.');
    btn.disabled=false; btn.textContent='Entrar';
  }
});
</script>
</body>
</html>
