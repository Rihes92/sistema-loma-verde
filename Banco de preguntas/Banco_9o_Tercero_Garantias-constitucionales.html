function toggle(id){const el=document.getElementById(id);el.classList.toggle('open')}

function renderAll(){
  const lista=document.getElementById('lista');
  lista.innerHTML='';
  PREGUNTAS.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.tipo=q.tipo;
    let inner='';
    if(q.tipo==='abierta'){
      inner=`<div class="card-top"><label class="chk"><input type="checkbox" class="q-chk" data-i="${i}"><span class="badge b-a">Abierta</span><span class="q-text"><strong>#${q.num}</strong> ${escHtml(q.q)}</span></label></div>
      <span class="toggle-btn" onclick="toggle('col-${i}')">▶ Ver respuesta modelo</span>
      <div class="colapsable" id="col-${i}">${escHtml(q.respuesta)}</div>`;
    } else if(q.tipo==='fv'){
      const esV=q.verdadero;
      inner=`<div class="card-top"><label class="chk"><input type="checkbox" class="q-chk" data-i="${i}"><span class="badge b-fv">F/V</span><span class="q-text"><strong>#${q.num}</strong> ${escHtml(q.q)}</span></label></div>
      <div class="vf-label ${esV?'vf-v':'vf-f'}">${esV?'✓ VERDADERO':'✗ FALSO'}</div>
      <span class="toggle-btn" onclick="toggle('col-${i}')">▶ Ver justificación</span>
      <div class="colapsable" id="col-${i}">${escHtml(q.justificacion)}</div>`;
    } else if(q.tipo==='sm'){
      const ops=q.opciones;
      const corr=q.correcta;
      const opHtml=['A','B','C','D'].map(l=>`<div class="op${l===corr?' correcta':''}">${l}. ${escHtml(ops[l])}${l===corr?' ✓':''}</div>`).join('');
      inner=`<div class="card-top"><label class="chk"><input type="checkbox" class="q-chk" data-i="${i}"><span class="badge b-sm">SM</span><span class="q-text"><strong>#${q.num}</strong> ${escHtml(q.q)}</span></label></div>
      ${q.enunciado?`<div class="enunciado">${escHtml(q.enunciado)}</div>`:''}<div class="opciones">${opHtml}</div>`;
    }
    card.innerHTML=inner;
    lista.appendChild(card);
  });
  actualizarConteo();
  document.querySelectorAll('.q-chk').forEach(c=>c.addEventListener('change',actualizarConteo));
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function filtrar(tipo,btn){
  document.querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c=>{
    c.classList.toggle('hidden', tipo!=='todas' && c.dataset.tipo!==tipo);
  });
}

function actualizarConteo(){
  const n=document.querySelectorAll('.q-chk:checked').length;
  document.getElementById('sel-count').textContent=n+' seleccionada'+(n===1?'':'s');
}

function exportar(){
  const sel=[...document.querySelectorAll('.q-chk:checked')].map(c=>parseInt(c.dataset.i));
  if(!sel.length){alert('Selecciona al menos una pregunta.');return;}
  const preguntas=sel.map(i=>PREGUNTAS[i].export);
  const payload={
    app:'loma_verde_banco_preguntas',
    exportado:new Date().toISOString(),
    origen:META,
    preguntas
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='banco_export_'+Date.now()+'.json';
  a.click();
}

renderAll();
</script>
